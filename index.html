<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Дэлхийн Өгөгдөл</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

:root {
  --bg: #030810;
  --surface: #071220;
  --border: rgba(0,200,255,0.12);
  --accent: #00c8ff;
  --accent2: #ff5533;
  --accent3: #44ff88;
  --accent4: #ffcc00;
  --text: #cce8f0;
  --muted: #3a5a6a;
  --sidebar: 300px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; overflow:hidden; }

/* ── LAYOUT ── */
#app {
  display: grid;
  grid-template-rows: 56px 44px 1fr;
  grid-template-columns: 1fr var(--sidebar);
  width: 100vw; height: 100vh;
}

/* ── HEADER ── */
header {
  grid-column: 1/-1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(3,8,16,0.95);
  backdrop-filter: blur(12px);
  z-index: 50;
}
.logo { display:flex; align-items:baseline; gap:10px; }
.logo h1 {
  font-family:'Bebas Neue',sans-serif; font-size:clamp(18px,3vw,26px);
  letter-spacing:3px;
  background:linear-gradient(90deg,var(--accent),#fff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo sub { font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }

.hstats { display:flex; gap:20px; }
.hs { text-align:right; }
.hs-v { font-family:'Bebas Neue',sans-serif; font-size:clamp(16px,2.5vw,22px); color:var(--accent); text-shadow:0 0 10px rgba(0,200,255,0.35); }
.hs-l { font-size:8px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }

/* ── CATEGORY BAR ── */
#catbar {
  grid-column: 1/-1;
  display: flex; align-items: center; gap: 0;
  padding: 0 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(5,12,22,0.98);
  overflow-x: auto; overflow-y: hidden;
  scrollbar-width: none;
  z-index: 40;
}
#catbar::-webkit-scrollbar { display:none; }

.cat-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 0 14px; height: 44px;
  white-space: nowrap;
  font-family:'Space Mono',monospace; font-size:10px; letter-spacing:1px;
  text-transform:uppercase;
  background:none; border:none; border-bottom:2px solid transparent;
  color:var(--muted); cursor:pointer; transition:all 0.2s;
  flex-shrink: 0;
}
.cat-btn:hover { color:var(--text); }
.cat-btn.on { color:var(--accent); border-bottom-color:var(--accent); }
.cat-icon { font-size:14px; }

/* ── MAP ── */
#map-area {
  position:relative; overflow:hidden;
  background: radial-gradient(ellipse at center, #060f1e 0%, #030810 100%);
}
#world-svg { width:100%; height:100%; cursor:grab; display:block; }
#world-svg:active { cursor:grabbing; }

.country-path { stroke:rgba(0,200,255,0.15); stroke-width:0.4; cursor:pointer; transition:filter 0.15s; }
.country-path:hover { stroke:var(--accent); stroke-width:1; filter:brightness(1.7); }
.country-path.sel { stroke:var(--accent2); stroke-width:1.6; filter:brightness(1.9) drop-shadow(0 0 5px rgba(255,85,51,0.5)); }
.graticule { fill:none; stroke:rgba(0,200,255,0.04); stroke-width:0.5; }
.sphere { fill:#040d1a; }
.borders { fill:none; stroke:rgba(0,200,255,0.1); stroke-width:0.3; }

/* map overlays */
.map-ctrl {
  position:absolute; display:flex; gap:4px;
}
.zoom-wrap { bottom:16px; left:16px; flex-direction:column; }
.proj-wrap { top:10px; left:10px; }
.map-ctrl button, .proj-sel {
  background:rgba(5,14,28,0.92); border:1px solid var(--border);
  color:var(--accent); font-family:'Space Mono',monospace; font-size:10px;
  cursor:pointer; border-radius:3px; transition:all 0.15s;
}
.map-ctrl button { width:30px; height:30px; font-size:16px; display:flex; align-items:center; justify-content:center; }
.map-ctrl button:hover { background:rgba(0,200,255,0.1); border-color:var(--accent); }
.proj-sel { padding:5px 8px; outline:none; letter-spacing:1px; }

/* ── SIDEBAR ── */
#sidebar {
  border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  background:rgba(4,10,20,0.98);
  overflow:hidden;
}
.sb-info {
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  min-height:96px; display:flex; flex-direction:column; justify-content:center;
  flex-shrink:0;
}
.sb-empty { font-size:10px; color:var(--muted); font-style:italic; }
.sb-name { font-family:'Bebas Neue',sans-serif; font-size:22px; color:#fff; line-height:1; margin-bottom:3px; }
.sb-main { font-size:20px; font-weight:700; color:var(--accent); text-shadow:0 0 8px rgba(0,200,255,0.3); }
.sb-unit { font-size:9px; color:var(--muted); }
.sb-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:6px; }
.sb-kv { font-size:9px; color:var(--muted); }
.sb-kv span { color:var(--text); font-size:10px; display:block; }

.sb-head { padding:10px 16px 8px; border-bottom:1px solid var(--border); flex-shrink:0; }
.sb-head-title { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:3px; color:var(--accent); }

.rank-list { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--muted) transparent; }
.rank-row {
  display:grid; grid-template-columns:24px 1fr 72px;
  align-items:center; gap:7px; padding:7px 16px;
  border-left:3px solid transparent; cursor:pointer; transition:all 0.12s;
}
.rank-row:hover { background:rgba(0,200,255,0.04); border-left-color:var(--accent); }
.rank-row.active { background:rgba(255,85,51,0.07); border-left-color:var(--accent2); }
.rn { font-size:10px; font-weight:700; color:var(--muted); text-align:center; }
.rn.g { color:#ffd700; } .rn.s { color:#c0c0c0; } .rn.b { color:#cd7f32; }
.ri-name { font-size:11px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:3px; }
.ri-bar { height:2px; background:rgba(255,255,255,0.05); border-radius:1px; overflow:hidden; }
.ri-fill { height:100%; border-radius:1px; transition:width 0.4s; }
.rval { font-size:10px; font-weight:700; color:var(--accent); text-align:right; white-space:nowrap; }

.legend-box { padding:10px 16px; border-top:1px solid var(--border); flex-shrink:0; }
.leg-title { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.leg-grad { height:6px; border-radius:3px; }
.leg-labels { display:flex; justify-content:space-between; font-size:8px; color:var(--muted); margin-top:3px; }

/* ── TOOLTIP ── */
#tip {
  position:fixed; background:rgba(4,12,24,0.97); border:1px solid var(--accent);
  border-radius:4px; padding:10px 14px; font-size:11px;
  pointer-events:none; opacity:0; transition:opacity 0.1s; z-index:9999;
  box-shadow:0 0 20px rgba(0,200,255,0.2); min-width:140px; max-width:200px;
}
#tip.show { opacity:1; }
#tip .tn { font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--accent); margin-bottom:3px; }
#tip .tv { font-size:13px; font-weight:700; color:#fff; }
#tip .ts { font-size:9px; color:var(--muted); margin-top:2px; }

/* ── MOBILE OVERLAY PANEL ── */
#mob-panel {
  display:none;
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:rgba(4,10,20,0.98);
  border-top:1px solid var(--border);
  border-radius:16px 16px 0 0;
  padding:12px 0 0;
  max-height:55vh;
  flex-direction:column;
  backdrop-filter:blur(20px);
}
.mob-drag { width:40px; height:4px; background:var(--muted); border-radius:2px; margin:0 auto 10px; }
.mob-info { padding:10px 18px 12px; border-bottom:1px solid var(--border); }
.mob-name { font-family:'Bebas Neue',sans-serif; font-size:24px; color:#fff; }
.mob-val { font-size:22px; font-weight:700; color:var(--accent); }
.mob-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:8px; }
.mob-kv { font-size:9px; color:var(--muted); }
.mob-kv span { color:var(--text); font-size:11px; display:block; font-weight:700; }
.mob-rank { flex:1; overflow-y:auto; padding:0; }
#mob-close {
  position:absolute; top:14px; right:16px;
  background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer;
}

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  :root { --sidebar: 0px; }
  #app { grid-template-columns: 1fr; grid-template-rows: 52px 40px 1fr; }
  #sidebar { display:none; }
  #mob-panel { display:flex; }
  .hstats { gap:12px; }
  .hs-v { font-size:15px; }
  #catbar { padding:0 8px; }
  .cat-btn { padding:0 10px; font-size:9px; }
  .cat-icon { font-size:12px; }
  .zoom-wrap { bottom:12px; left:12px; }
  .proj-wrap { display:none; }
}

@media (min-width:701px) {
  #mob-panel { display:none !important; }
}
</style>
</head>

<div id="app">
  <header>
    <div class="logo">
      <h1>ДЭЛХИЙ</h1>
      <sub>Data Atlas · 2026</sub>
    </div>
    <div class="hstats">
      <div class="hs"><div class="hs-v" id="h-val">8,119,000,000</div><div class="hs-l" id="h-lbl">Нийт хүн ам</div></div>
      <div class="hs"><div class="hs-v">195</div><div class="hs-l">Улс орон</div></div>
    </div>
  </header>

  <div id="catbar">
    <button class="cat-btn on" onclick="setCat('pop',this)"><span class="cat-icon">👥</span>Хүн ам</button>
    <button class="cat-btn" onclick="setCat('density',this)"><span class="cat-icon">📍</span>Нягтрал</button>
    <button class="cat-btn" onclick="setCat('growth',this)"><span class="cat-icon">📈</span>Өсөлт</button>
    <button class="cat-btn" onclick="setCat('gdp',this)"><span class="cat-icon">💰</span>ДНБ/хүн</button>
    <button class="cat-btn" onclick="setCat('hdi',this)"><span class="cat-icon">🎓</span>HDI</button>
    <button class="cat-btn" onclick="setCat('life',this)"><span class="cat-icon">❤️</span>Наслалт</button>
    <button class="cat-btn" onclick="setCat('co2',this)"><span class="cat-icon">🌱</span>CO₂</button>
    <button class="cat-btn" onclick="setCat('internet',this)"><span class="cat-icon">🌐</span>Интернет</button>
  </div>

  <div id="map-area">
    <svg id="world-svg"></svg>
    <div class="map-ctrl proj-wrap">
      <select class="proj-sel" id="proj-sel" onchange="changeProjection(this.value)">
        <option value="natural">Natural Earth</option>
        <option value="mercator">Mercator</option>
        <option value="ortho">Orthographic</option>
        <option value="equal">Equal Earth</option>
      </select>
    </div>
    <div class="map-ctrl zoom-wrap">
      <button onclick="zoomIn()">+</button>
      <button onclick="zoomReset()">⊙</button>
      <button onclick="zoomOut()">−</button>
    </div>
  </div>

  <div id="sidebar">
    <div class="sb-info" id="sb-info">
      <div class="sb-empty">↑ Газрын зурагт улс дарна уу</div>
    </div>
    <div class="sb-head"><div class="sb-head-title" id="sb-rank-title">ТОП УЛСУУД · ХҮН АМ</div></div>
    <div class="rank-list" id="rank-list"></div>
    <div class="legend-box">
      <div class="leg-title" id="leg-title">Хүн амын хэмжээ</div>
      <div class="leg-grad" id="leg-grad"></div>
      <div class="leg-labels" id="leg-labels"><span>Бага</span><span>Дунд</span><span>Их</span></div>
    </div>
  </div>
</div>

<!-- Mobile bottom panel -->
<div id="mob-panel">
  <div class="mob-drag"></div>
  <button id="mob-close" onclick="closeMobPanel()">✕</button>
  <div class="mob-info" id="mob-info" style="display:none">
    <div class="mob-name" id="mob-name"></div>
    <div class="mob-val" id="mob-val"></div>
    <div class="mob-grid" id="mob-grid"></div>
  </div>
  <div class="mob-rank rank-list" id="mob-rank-list"></div>
</div>

<div id="tip">
  <div class="tn" id="t-name"></div>
  <div class="tv" id="t-val"></div>
  <div class="ts" id="t-sub"></div>
</div>

const TOTAL = 8119;
let cat = 'pop';
let selId = null;
let wdata = null;
let svg, g, proj, pathFn, zoom;
let isMobile = () => window.innerWidth <= 700;

// ── COLOR SCALE ──
function getColor(id) {
  const d = D[id]; if (!d) return '#060e1c';
  const c = CATS[cat];
  const v = d[cat];
  if (v === undefined || v === null) return '#060e1c';
  const scale = c.log
    ? d3.scaleSequentialLog().domain([0.05, getMax()]).interpolator(d3.interpolateRgb(c.colorA, c.colorB))
    : d3.scaleSequential().domain([getMin(), getMax()]).interpolator(d3.interpolateRgb(c.colorA, c.colorB));
  try { return scale(Math.max(v, 0.05)); } catch(e) { return '#060e1c'; }
}

function getMax() {
  return Math.max(...Object.values(D).map(d => d[cat]).filter(v => v !== undefined && v !== null));
}
function getMin() {
  const vals = Object.values(D).map(d => d[cat]).filter(v => v !== undefined && v !== null);
  return Math.min(...vals);
}

function fmtVal(v) { return CATS[cat].fmt(v); }

// ── INIT MAP ──
async function init() {
  const area = document.getElementById('map-area');
  const w = area.clientWidth, h = area.clientHeight;
  svg = d3.select('#world-svg');
  g = svg.append('g');

  proj = d3.geoNaturalEarth1().scale(w/6.3).translate([w/2, h/2]);
  pathFn = d3.geoPath().projection(proj);

  g.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d', pathFn);
  g.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d', pathFn);

  zoom = d3.zoom().scaleExtent([0.7, 20]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  try {
    const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    wdata = await res.json();
    drawMap();
    renderRankings();
    animateHeader();
    updateLegend();
  } catch(e) {
    console.error(e);
    document.getElementById('map-area').innerHTML += '<div style="color:#ff5533;padding:20px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">Газрын зураг ачаалагдсангүй. Интернет холболт шалгана уу.</div>';
  }
}

function drawMap() {
  if (!wdata) return;
  g.selectAll('.cp').remove();
  g.selectAll('.brd').remove();
  const countries = topojson.feature(wdata, wdata.objects.countries).features;
  g.selectAll('.cp').data(countries).enter().append('path')
    .attr('class', d => `country-path cp ${String(d.id)===selId?'sel':''}`)
    .attr('d', pathFn)
    .attr('fill', d => getColor(String(d.id)))
    .on('mouseover', function(e, d) {
      if (isMobile()) return;
      const pd = D[String(d.id)]; if (!pd) return;
      document.getElementById('t-name').textContent = pd.n;
      document.getElementById('t-val').textContent = fmtVal(pd[cat]);
      document.getElementById('t-sub').textContent = CATS[cat].label + ' · ' + ((pd.pop/TOTAL)*100).toFixed(2)+'% хүн ам';
      document.getElementById('tip').classList.add('show');
    })
    .on('mousemove', function(e) {
      if (isMobile()) return;
      const tip = document.getElementById('tip');
      tip.style.left = Math.min(e.clientX+14, window.innerWidth-210)+'px';
      tip.style.top = Math.max(e.clientY-65, 10)+'px';
    })
    .on('mouseleave', () => document.getElementById('tip').classList.remove('show'))
    .on('click', function(e, d) {
      const id = String(d.id);
      selId = id;
      g.selectAll('.cp').classed('sel', dd => String(dd.id)===id);
      const pd = D[id];
      showInfo(pd, id);
      highlightRank(id);
      if (isMobile()) openMobPanel(pd, id);
    });

  g.append('path')
    .datum(topojson.mesh(wdata, wdata.objects.countries, (a,b)=>a!==b))
    .attr('class','borders brd')
    .attr('d', pathFn);
}

// ── INFO PANEL ──
function infoHTML(pd, id) {
  if (!pd) return '<div class="sb-empty">Мэдээлэл байхгүй</div>';
  const pct = ((pd.pop/TOTAL)*100).toFixed(2);
  return `
    <div class="sb-name">${pd.n}</div>
    <div class="sb-main">${fmtVal(pd[cat])}</div>
    <div class="sb-unit">${CATS[cat].unit}</div>
    <div class="sb-grid">
      <div class="sb-kv">Хүн ам<span>${pd.pop>=1000?(pd.pop/1000).toFixed(2)+' тэрбум':pd.pop.toFixed(1)+' сая'}</span></div>
      <div class="sb-kv">Нягтрал<span>${pd.density}/км²</span></div>
      <div class="sb-kv">ДНБ/хүн<span>$${pd.gdp.toLocaleString()}</span></div>
      <div class="sb-kv">HDI<span>${pd.hdi}</span></div>
      <div class="sb-kv">Наслалт<span>${pd.life} жил</span></div>
      <div class="sb-kv">CO₂<span>${pd.co2} тн</span></div>
      <div class="sb-kv">Интернет<span>${pd.internet}%</span></div>
      <div class="sb-kv">Хүн амын %<span>${pct}%</span></div>
    </div>`;
}

function showInfo(pd, id) {
  document.getElementById('sb-info').innerHTML = infoHTML(pd, id);
}

// ── MOBILE PANEL ──
function openMobPanel(pd, id) {
  const panel = document.getElementById('mob-panel');
  if (!pd) return;
  document.getElementById('mob-info').style.display = 'block';
  document.getElementById('mob-name').textContent = pd.n;
  document.getElementById('mob-val').textContent = fmtVal(pd[cat]);
  document.getElementById('mob-grid').innerHTML = `
    <div class="mob-kv">Хүн ам<span>${pd.pop>=1000?(pd.pop/1000).toFixed(2)+' тэрбум':pd.pop.toFixed(1)+' сая'}</span></div>
    <div class="mob-kv">Нягтрал<span>${pd.density}/км²</span></div>
    <div class="mob-kv">ДНБ/хүн<span>$${pd.gdp.toLocaleString()}</span></div>
    <div class="mob-kv">HDI<span>${pd.hdi}</span></div>
    <div class="mob-kv">Наслалт<span>${pd.life}жил</span></div>
    <div class="mob-kv">CO₂<span>${pd.co2}тн</span></div>
  `;
  panel.style.display = 'flex';
}

function closeMobPanel() {
  document.getElementById('mob-info').style.display = 'none';
}

// ── RANKINGS ──
function renderRankings() {
  const entries = Object.entries(D)
    .filter(([,d]) => d[cat] !== undefined)
    .sort((a,b) => b[1][cat] - a[1][cat])
    .slice(0, 30);
  const maxV = entries[0][1][cat];
  const minV = entries[entries.length-1][1][cat];
  const range = maxV - minV || 1;

  const html = entries.map(([id, d], i) => {
    const v = d[cat];
    const pct = ((v - minV) / range * 100).toFixed(1);
    const cc = i===0?'g':i===1?'s':i===2?'b':'';
    const fillC = cat==='growth'&&v<0 ? 'var(--accent2)' : i<3 ? ['#ffd700','#c0c0c0','#cd7f32'][i] : 'var(--accent)';
    return `<div class="rank-row ${id===selId?'active':''}" data-id="${id}" onclick="pickRank('${id}')">
      <div class="rn ${cc}">${i+1}</div>
      <div><div class="ri-name">${d.n}</div><div class="ri-bar"><div class="ri-fill" style="width:${pct}%;background:${fillC}"></div></div></div>
      <div class="rval">${fmtVal(v)}</div>
    </div>`;
  }).join('');

  document.getElementById('rank-list').innerHTML = html;
  document.getElementById('mob-rank-list').innerHTML = html;
  document.getElementById('sb-rank-title').textContent = `ТОП 30 · ${CATS[cat].label.toUpperCase()}`;
}

function pickRank(id) {
  selId = id;
  const pd = D[id];
  showInfo(pd, id);
  highlightRank(id);
  if (wdata) g.selectAll('.cp').classed('sel', d => String(d.id)===id);
  if (isMobile()) openMobPanel(pd, id);
}

function highlightRank(id) {
  document.querySelectorAll('.rank-row').forEach(r => r.classList.toggle('active', r.dataset.id===id));
}

// ── LEGEND ──
function updateLegend() {
  const c = CATS[cat];
  document.getElementById('leg-title').textContent = c.label;
  document.getElementById('leg-grad').style.background = `linear-gradient(90deg,${c.colorA},${c.colorB})`;
  const mn = getMin(), mx = getMax();
  document.getElementById('leg-labels').innerHTML = `<span>${fmtVal(mn)}</span><span>${fmtVal(mx)}</span>`;
  document.getElementById('h-lbl').textContent = c.header;
  const topVal = Object.values(D).sort((a,b)=>b[cat]-a[cat])[0][cat];
  document.getElementById('h-val').textContent = fmtVal(topVal);
}

// ── CAT SWITCH ──
function setCat(c, btn) {
  cat = c;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  drawMap();
  renderRankings();
  updateLegend();
  if (selId && D[selId]) { showInfo(D[selId], selId); if(isMobile()) openMobPanel(D[selId], selId); }
}

// ── PROJECTION ──
function changeProjection(v) {
  const area = document.getElementById('map-area');
  const w = area.clientWidth, h = area.clientHeight;
  const ps = {
    natural: d3.geoNaturalEarth1().scale(w/6.3).translate([w/2,h/2]),
    mercator: d3.geoMercator().scale(w/6.5).translate([w/2,h/1.55]),
    ortho: d3.geoOrthographic().scale(Math.min(w,h)/2.2).translate([w/2,h/2]),
    equal: d3.geoEqualEarth().scale(w/6.3).translate([w/2,h/2]),
  };
  proj = ps[v] || ps.natural;
  pathFn = d3.geoPath().projection(proj);
  svg.call(zoom.transform, d3.zoomIdentity);
  g.select('.sphere').attr('d', pathFn({type:'Sphere'}));
  g.select('.graticule').attr('d', pathFn(d3.geoGraticule()()));
  drawMap();
}

function zoomIn() { svg.transition().call(zoom.scaleBy,1.6); }
function zoomOut() { svg.transition().call(zoom.scaleBy,0.625); }
function zoomReset() { svg.transition().call(zoom.transform, d3.zoomIdentity); }

function animateHeader() {
  const el = document.getElementById('h-val');
  const c = CATS[cat]; const target = TOTAL*1e6;
  if (cat !== 'pop') { updateLegend(); return; }
  const dur=1600, start=Date.now();
  const tick=()=>{
    const p=Math.min((Date.now()-start)/dur,1), e=1-Math.pow(1-p,3);
    el.textContent=(Math.round(e*target)).toLocaleString();
    if(p<1) requestAnimationFrame(tick); else el.textContent='8,119,000,000';
  };
  tick();
}

window.addEventListener('resize', () => {
  if (wdata) changeProjection(document.getElementById('proj-sel')?.value || 'natural');
});

init();
</script>
</body>
</html>
